spring:
  # PostgreSQL for production (via Docker)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pettycash}
    username: ${SPRING_DATASOURCE_USERNAME:pettycash}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false

  # Liquibase
  liquibase:
    enabled: true

app:
  security:
    demo-login-enabled: ${DEMO_LOGIN_ENABLED:false}
    allowed-domain: ${ALLOWED_DOMAIN:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    jwt:
      secret: ${JWT_SECRET:defaultsecretkeythatislongerthan32charactersforhs256signatureverificationkey}
      expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  google:
    drive:
      private-key: ${GOOGLE_DRIVE_PRIVATE_KEY:}
      client-email: ${GOOGLE_DRIVE_CLIENT_EMAIL:}
      parent-folder-id: ${GOOGLE_DRIVE_PARENT_FOLDER_ID:}
