spring:
  # H2 in-memory for tests
  datasource:
    url: jdbc:h2:mem:pettycash_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Liquibase
  liquibase:
    enabled: true

app:
  security:
    demo-login-enabled: true
    allowed-domain: ""
    google:
      client-id: "test-google-client-id"
    jwt:
      secret: "defaultsecretkeythatislongerthan32charactersforhs256signatureverificationkey"
      expiration-hours: 8
  google:
    drive:
      private-key: ""
      client-email: ""
      parent-folder-id: ""
