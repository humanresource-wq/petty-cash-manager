spring:
  application:
    name: petty-cash-manager

  # Liquibase
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  # JPA defaults
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # File upload limits
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Server
server:
  port: ${SERVER_PORT:8080}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# App-specific config
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    demo-login-enabled: ${DEMO_LOGIN_ENABLED:true}
    allowed-domain: ${ALLOWED_DOMAIN:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    jwt:
      secret: ${JWT_SECRET:defaultsecretkeythatislongerthan32charactersforhs256signatureverificationkey}
      expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  google:
    drive:
      private-key: ${GOOGLE_DRIVE_PRIVATE_KEY:}
      client-email: ${GOOGLE_DRIVE_CLIENT_EMAIL:}
      parent-folder-id: ${GOOGLE_DRIVE_PARENT_FOLDER_ID:}

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
