services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST:       db
      POSTGRES_DB:         ${POSTGRES_DB:-pettycash}
      POSTGRES_USER:       ${POSTGRES_USER:-pettycash}
      POSTGRES_PASSWORD:   ${POSTGRES_PASSWORD:-pettycashpass}
      SCHEDULE:            ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS:    ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS:   ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS:  ${BACKUP_KEEP_MONTHS:-6}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
    volumes:
      - ./backups:/backups

  drive-uploader:
    build:
      context: ./backend
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    depends_on:
      db-backup:
        condition: service_started
    volumes:
      - ./backups:/backups:ro
    environment:
      GOOGLE_PRIVATE_KEY:            ${GOOGLE_DRIVE_PRIVATE_KEY:-}
      GOOGLE_CLIENT_EMAIL:           ${GOOGLE_DRIVE_CLIENT_EMAIL:-}
      GOOGLE_DRIVE_PARENT_FOLDER_ID: ${GOOGLE_DRIVE_PARENT_FOLDER_ID:-}
      BACKUP_DIR:                    /backups

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  pgdata:
    driver: local
