services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pettycash}
      POSTGRES_USER: ${POSTGRES_USER:-pettycash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pettycash_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pettycash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pettycash}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pettycash}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pettycash_dev}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  pgdata:
    driver: local
